name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug
    
    - name: Rename APK with date
      run: |
        DATE=$(date +%Y%m%d)
        mv app/build/outputs/apk/debug/app-debug.apk MiaoLeGeMiao_$DATE.apk || \
        mv app/build/outputs/apk/debug/*.apk MiaoLeGeMiao_$DATE.apk
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MiaoLeGeMiao-APK
        path: MiaoLeGeMiao_*.apk
