name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: amyu/setup-android@v4
      with:
        sdk-version: 34
        build-tools-version: 34.0.0
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug
    
    - name: Rename APK
      run: |
        cd app/build/outputs/apk/debug
        mv *.apk jinhuohuo.apk
    
    - name: Upload APK to Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.0
        name: 金火火 Android App
        body: |
          ## 金火火 Android App
          
          点击下方 **jinhuohuo.apk** 直接下载安装
          
          **功能：**
          - 访问 https://miaolegemiao.cn
          - 全屏WebView体验
          - 支持所有网页功能
        files: app/build/outputs/apk/debug/jinhuohuo.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
